<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paper Trade – ATR Strategy</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #131722; color: #d1d4dc; }
    .layout { display: flex; flex-direction: column; height: 100vh; }
    /* Mảng 1: Tổng quan */
    .overview { flex: 0 0 auto; display: flex; align-items: center; flex-wrap: wrap; gap: 12px 20px; padding: 10px 16px; background: #1e222d; border-bottom: 1px solid #2a2e39; }
    .overview label { font-weight: 600; color: #787b86; }
    .overview input[type="number"] { width: 100px; padding: 6px 8px; background: #2a2e39; border: 1px solid #363a45; color: #d1d4dc; border-radius: 4px; }
    .overview .stat { padding: 4px 10px; background: #2a2e39; border-radius: 4px; font-size: 13px; }
    .overview .stat.positive { color: #26a69a; }
    .overview .stat.negative { color: #ef5350; }
    .overview select { padding: 6px 10px; background: #2a2e39; border: 1px solid #363a45; color: #d1d4dc; border-radius: 4px; cursor: pointer; }
    .overview button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; }
    .overview button.start { background: #26a69a; color: #fff; }
    .overview button.pause { background: #f2a900; color: #000; }
    .overview button.stop { background: #ef5350; color: #fff; }
    .overview button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-weight: 600; font-size: 12px; }
    .status-running { background: #26a69a; color: #fff; }
    .status-paused { background: #f2a900; color: #000; }
    .status-stopped { background: #636368; color: #fff; }
    .refresh-msg { font-size: 11px; color: #787b86; }
    /* Mảng 2 + 3: Content – trái (list lệnh) và phải (chart) mỗi bên 50% chiều ngang */
    .content { flex: 1; display: flex; min-height: 0; }
    /* Trái: List lệnh – 50% chiều ngang, đủ chỗ hiển thị đủ cột */
    .orders-panel { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; background: #1e222d; border-right: 1px solid #2a2e39; overflow: hidden; }
    .orders-panel h3 { margin: 0; padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #2a2e39; flex-shrink: 0; }
    .orders-table-wrap { flex: 1; overflow-x: auto; overflow-y: auto; min-height: 0; }
    .orders-table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 12px; table-layout: auto; }
    .orders-table th { position: sticky; top: 0; background: #2a2e39; padding: 6px 8px; text-align: left; white-space: nowrap; min-width: 1em; }
    .orders-table td { padding: 6px 8px; border-bottom: 1px solid #2a2e39; white-space: nowrap; }
    .orders-table th:nth-child(1), .orders-table td:nth-child(1) { min-width: 2.5em; }
    .orders-table th:nth-child(2), .orders-table td:nth-child(2) { min-width: 5em; }
    .orders-table th:nth-child(3), .orders-table td:nth-child(3) { min-width: 4em; }
    .orders-table th:nth-child(4), .orders-table td:nth-child(4) { min-width: 8em; }
    .orders-table th:nth-child(5), .orders-table td:nth-child(5) { min-width: 5em; }
    .orders-table th:nth-child(6), .orders-table td:nth-child(6) { min-width: 8em; }
    .orders-table th:nth-child(7), .orders-table td:nth-child(7) { min-width: 5em; }
    .orders-table th:nth-child(8), .orders-table td:nth-child(8) { min-width: 5em; }
    .orders-table th:nth-child(9), .orders-table td:nth-child(9) { min-width: 4em; }
    .orders-table th:nth-child(10), .orders-table td:nth-child(10) { min-width: 5em; }
    .orders-table th:nth-child(11), .orders-table td:nth-child(11) { min-width: 4.5em; }
    .orders-table tr.pnl-positive { background: rgba(38, 166, 154, 0.15); }
    .orders-table tr.pnl-negative { background: rgba(239, 83, 80, 0.15); }
    .orders-table tr.pnl-positive:hover { background: rgba(38, 166, 154, 0.25); }
    .orders-table tr.pnl-negative:hover { background: rgba(239, 83, 80, 0.25); }
    .orders-table .pnl-pos { color: #26a69a; }
    .orders-table .pnl-neg { color: #ef5350; }
    /* Phải: Charts – 50% chiều ngang; trong đó chart giá (2/3) trên, RSI/WMA/EMA (1/3) dưới */
    .charts-panel { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
    .chart-price-wrap { flex: 0 0 66.666%; display: flex; flex-direction: column; min-height: 0; border-bottom: 1px solid #2a2e39; }
    .chart-price-wrap .chart-title { padding: 4px 12px; font-size: 12px; color: #787b86; flex-shrink: 0; }
    #chartPrice { flex: 1; min-height: 160px; }
    .chart-indicator-wrap { flex: 0 0 33.333%; display: flex; flex-direction: column; min-height: 0; }
    .chart-indicator-wrap .chart-title { padding: 4px 12px; font-size: 12px; color: #787b86; flex-shrink: 0; }
    #chartIndicator { flex: 1; min-height: 120px; }
  </style>
</head>
<body>
  <div class="layout">
    <header class="overview">
      <label>Vốn (USDT)</label>
      <input type="number" id="initial_capital" value="1000" min="1" step="1">
      <button class="start" id="btnStart">Kích hoạt</button>
      <button class="pause" id="btnPause">Tạm dừng</button>
      <button class="stop" id="btnStop">Dừng</button>
      <span class="status-badge status-stopped" id="statusBadge">stopped</span>
      <span class="stat" id="statStarted">Bắt đầu: —</span>
      <label>Khung thời gian</label>
      <select id="timeframe">
        <option value="1m">1 phút</option>
        <option value="5m" selected>5 phút</option>
        <option value="15m">15 phút</option>
        <option value="1h">1 giờ</option>
        <option value="4h">4 giờ</option>
        <option value="1d">1 ngày</option>
        <option value="3d">3 ngày</option>
      </select>
      <span class="stat" id="statTrades">Lệnh: 0</span>
      <span class="stat" id="statWinrate">Winrate: 0%</span>
      <span class="stat" id="statPnl">PNL: 0.00</span>
      <span class="stat" id="statBalance">Vốn: 0.00</span>
      <span class="refresh-msg" id="refreshMsg">Cập nhật 5s</span>
    </header>

    <div class="content">
      <aside class="orders-panel">
        <h3>Lệnh (mới nhất trên cùng)</h3>
        <div class="orders-table-wrap">
          <table class="orders-table">
            <thead>
              <tr>
                <th>ID</th><th>Symbol</th><th>Side</th><th>Vào lúc</th><th>Giá vào</th><th>Ra lúc</th><th>Giá ra</th><th>Profit</th><th>% PnL</th><th>Cap After</th><th>Reason</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </aside>

      <main class="charts-panel">
        <div class="chart-price-wrap">
          <div class="chart-title" id="chartPriceTitle">Giá + Volume (Binance)</div>
          <div id="chartPrice"></div>
        </div>
        <div class="chart-indicator-wrap">
          <div class="chart-title">Chỉ báo: RSI, EMA_RSI, WMA_RSI (0–100) — giá trị bên phải</div>
          <div id="chartIndicator"></div>
        </div>
      </main>
    </div>
  </div>

  <script>
(function() {
  const INTERVAL_MS = 5000;
  let chartPrice = null, chartIndicator = null;
  let seriesCandle = null, seriesEma = null, seriesVolume = null;
  let seriesRsi = null, seriesEmaRsi = null, seriesWmaRsi = null;
  let currentTimeframe = '5m';
  let lastOrders = [];
  let lastKlines = { ohlc: [], indicators: {} };
  let userHasZoomedOrPanned = false;
  let lastVisibleRange = null;

  const capitalInput = document.getElementById('initial_capital');
  const statusBadge = document.getElementById('statusBadge');
  const timeframeSelect = document.getElementById('timeframe');
  const ordersBody = document.getElementById('ordersBody');
  const chartPriceTitle = document.getElementById('chartPriceTitle');
  const refreshMsg = document.getElementById('refreshMsg');

  function setStatusBadge(s) {
    statusBadge.textContent = s;
    statusBadge.className = 'status-badge ';
    if (s === 'running') statusBadge.classList.add('status-running');
    else if (s === 'paused') statusBadge.classList.add('status-paused');
    else statusBadge.classList.add('status-stopped');
  }

  function formatDate(x) {
    if (!x) return '—';
    try { return new Date(x).toLocaleString('vi-VN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); } catch(e) { return String(x); }
  }

  function updateOverview(d) {
    document.getElementById('statStarted').textContent = 'Bắt đầu: ' + (d.paper_started_at ? formatDate(d.paper_started_at) : '—');
    document.getElementById('statTrades').textContent = 'Lệnh: ' + (d.paper_trades_count || 0);
    document.getElementById('statWinrate').textContent = 'Winrate: ' + (d.paper_winrate != null ? d.paper_winrate : 0) + '%';
    const pnl = d.paper_total_pnl != null ? d.paper_total_pnl : 0;
    const elPnl = document.getElementById('statPnl');
    elPnl.textContent = 'PNL: ' + pnl.toFixed(2);
    elPnl.className = 'stat ' + (pnl >= 0 ? 'positive' : 'negative');
    document.getElementById('statBalance').textContent = 'Vốn: ' + (d.paper_balance != null ? d.paper_balance : 0).toFixed(2);
    setStatusBadge(d.paper_status || 'stopped');
  }

  function fetchOrders() {
    fetch('/api/orders').then(r => r.json()).then(data => {
      const orders = data.orders || [];
      lastOrders = orders;
      ordersBody.innerHTML = orders.map((o, idx) => {
        const pnl = o.pnl != null ? o.pnl : 0;
        const rowClass = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
        const pnlClass = pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
        const pnlStr = (pnl >= 0 ? '+' : '') + pnl.toFixed(2);
        const pctPnl = o.pct_pnl != null ? ((o.pct_pnl >= 0 ? '+' : '') + o.pct_pnl.toFixed(2) + '%') : '—';
        const capAfter = o.capital_after != null ? Number(o.capital_after).toFixed(2) : '—';
        const id = o.is_open ? '•' : (o.id != null ? o.id : idx + 1);
        return '<tr class="' + rowClass + '"><td>' + id + '</td><td>' + (o.symbol || '') + '</td><td>' + (o.side || '') + (o.is_open ? ' (mở)' : '') +
          '</td><td>' + formatDate(o.entry_time) + '</td><td>' + (o.entry_price != null ? Number(o.entry_price).toFixed(2) : '') +
          '</td><td>' + formatDate(o.exit_time) + '</td><td>' + (o.exit_price != null ? Number(o.exit_price).toFixed(2) : '') +
          '</td><td class="' + pnlClass + '">' + pnlStr + '</td><td class="' + pnlClass + '">' + pctPnl + '</td><td>' + capAfter + '</td><td>' + (o.exit_reason || '—') + '</td></tr>';
      }).join('');
    }).catch(() => {});
  }

  function toChartTime(isoStr) {
    if (!isoStr) return null;
    const d = new Date(isoStr);
    return Math.floor(d.getTime() / 1000);
  }

  function buildMarkers(orders) {
    const markers = [];
    (orders || []).forEach(o => {
      const tEntry = o.entry_time ? toChartTime(o.entry_time) : null;
      if (tEntry) markers.push({ time: tEntry, position: o.side === 'LONG' ? 'belowBar' : 'aboveBar', color: o.side === 'LONG' ? '#26a69a' : '#ef5350', shape: 'arrowUp', text: 'Vào' });
      const tExit = o.exit_time ? toChartTime(o.exit_time) : null;
      if (tExit) markers.push({ time: tExit, position: o.side === 'LONG' ? 'aboveBar' : 'belowBar', color: '#787b86', shape: 'arrowDown', text: 'Ra' });
    });
    return markers;
  }

  function fetchKlines(forceFitContent) {
    const interval = timeframeSelect.value;
    const timeframeChanged = interval !== currentTimeframe;
    currentTimeframe = interval;
    if (chartPrice && userHasZoomedOrPanned && !forceFitContent && !timeframeChanged) {
      try { lastVisibleRange = chartPrice.timeScale().getVisibleRange(); } catch (e) { lastVisibleRange = null; }
    }
    fetch('/api/klines?interval=' + encodeURIComponent(interval) + '&limit=500')
      .then(r => r.json())
      .then(data => {
        lastKlines = data;
        const ohlc = data.ohlc || [];
        chartPriceTitle.textContent = 'Giá ' + (data.symbol || '') + ' ' + interval;
        if (!ohlc.length) return;
        const candleData = ohlc.map(c => ({ time: toChartTime(c.time), open: c.open, high: c.high, low: c.low, close: c.close }));
        const volumeData = ohlc.map(c => ({
          time: toChartTime(c.time),
          value: c.volume != null ? c.volume : 0,
          color: c.close >= c.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)'
        })).filter(x => x.time != null && x.value > 0);
        const ind = data.indicators || {};
        const times = ind.times || ohlc.map(c => c.time);
        if (seriesCandle) { seriesCandle.setData(candleData); seriesCandle.setMarkers(buildMarkers(lastOrders)); }
        if (seriesVolume && volumeData.length) seriesVolume.setData(volumeData);
        if (seriesEma && ind.EMA && ind.EMA.length) {
          seriesEma.setData(times.map((t, i) => ({ time: toChartTime(t), value: ind.EMA[i] })).filter(x => x.time));
        }
        if (chartIndicator && ind.RSI && ind.RSI.length) {
          const rsiData = times.map((t, i) => ({ time: toChartTime(t), value: ind.RSI[i] })).filter(x => x.time != null);
          const emaRsiData = (ind.EMA_RSI || []).length ? times.map((t, i) => ({ time: toChartTime(t), value: ind.EMA_RSI[i] })).filter(x => x.time != null) : [];
          const wmaRsiData = (ind.WMA_RSI || []).length ? times.map((t, i) => ({ time: toChartTime(t), value: ind.WMA_RSI[i] })).filter(x => x.time != null) : [];
          if (seriesRsi) seriesRsi.setData(rsiData);
          if (seriesEmaRsi && emaRsiData.length) seriesEmaRsi.setData(emaRsiData);
          if (seriesWmaRsi && wmaRsiData.length) seriesWmaRsi.setData(wmaRsiData);
        }
        if (chartPrice && (forceFitContent || timeframeChanged)) {
          chartPrice.timeScale().fitContent();
          if (chartIndicator) chartIndicator.timeScale().fitContent();
          userHasZoomedOrPanned = false;
        } else if (chartPrice && lastVisibleRange && lastVisibleRange.from != null && lastVisibleRange.to != null) {
          try {
            chartPrice.timeScale().setVisibleRange(lastVisibleRange);
            if (chartIndicator) chartIndicator.timeScale().setVisibleRange(lastVisibleRange);
          } catch (e) {}
        }
      }).catch(() => {});
  }

  function initCharts() {
    const rightOffset = 18;
    const opts = {
      layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
      grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
      width: document.getElementById('chartPrice').clientWidth,
      height: document.getElementById('chartPrice').clientHeight,
      timeScale: { timeVisible: true, secondsVisible: false, rightBarOffset: rightOffset, lockVisibleTimeRangeOnResize: false },
      rightPriceScale: { scaleMargins: { top: 0.1, bottom: 0.2 }, borderVisible: true },
    };
    chartPrice = LightweightCharts.createChart(document.getElementById('chartPrice'), opts);
    seriesCandle = chartPrice.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350', borderVisible: false });
    seriesCandle.priceScale().applyOptions({ scaleMargins: { top: 0.1, bottom: 0.35 } });
    seriesEma = chartPrice.addLineSeries({ color: '#f2a900', lineWidth: 2 });
    seriesVolume = chartPrice.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: '' });
    seriesVolume.priceScale().applyOptions({ scaleMargins: { top: 0.7, bottom: 0 }, borderVisible: false });
    chartPrice.timeScale().fitContent();

    const optsInd = {
      layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
      grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
      width: document.getElementById('chartIndicator').clientWidth,
      height: document.getElementById('chartIndicator').clientHeight,
      timeScale: { timeVisible: true, rightBarOffset: rightOffset, lockVisibleTimeRangeOnResize: false },
      rightPriceScale: { scaleMargins: { top: 0.1, bottom: 0.1 }, borderVisible: true },
    };
    chartIndicator = LightweightCharts.createChart(document.getElementById('chartIndicator'), optsInd);
    seriesRsi = chartIndicator.addLineSeries({ color: '#e0e0e0', lineWidth: 2 });
    seriesEmaRsi = chartIndicator.addLineSeries({ color: '#26a69a', lineWidth: 2 });
    seriesWmaRsi = chartIndicator.addLineSeries({ color: '#ef5350', lineWidth: 2 });
    chartIndicator.timeScale().fitContent();

    chartPrice.timeScale().subscribeVisibleTimeRangeChange(() => {
      userHasZoomedOrPanned = true;
      const range = chartPrice.timeScale().getVisibleRange();
      if (range && chartIndicator) chartIndicator.timeScale().setVisibleRange(range);
    });
    chartIndicator.timeScale().subscribeVisibleTimeRangeChange(() => {
      userHasZoomedOrPanned = true;
      const range = chartIndicator.timeScale().getVisibleRange();
      if (range && chartPrice) chartPrice.timeScale().setVisibleRange(range);
    });
  }

  function refresh() {
    fetch('/api/status').then(r => r.json()).then(d => {
      updateOverview(d);
      fetchOrders();
    }).catch(() => {});
  }

  function resizeCharts() {
    if (chartPrice) chartPrice.applyOptions({ width: document.getElementById('chartPrice').clientWidth, height: document.getElementById('chartPrice').clientHeight });
    if (chartIndicator) chartIndicator.applyOptions({ width: document.getElementById('chartIndicator').clientWidth, height: document.getElementById('chartIndicator').clientHeight });
  }

  document.getElementById('btnStart').addEventListener('click', () => {
    const cap = parseFloat(capitalInput.value);
    if (!(cap > 0)) { alert('Nhập vốn > 0'); return; }
    fetch('/api/paper/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ initial_capital: cap }) })
      .then(r => r.json()).then(d => { if (d.ok) refresh(); else alert(d.error || 'Lỗi'); });
  });
  document.getElementById('btnPause').addEventListener('click', () => {
    fetch('/api/paper/pause', { method: 'POST' }).then(r => r.json()).then(d => { if (d.ok) refresh(); });
  });
  document.getElementById('btnStop').addEventListener('click', () => {
    fetch('/api/paper/stop', { method: 'POST' }).then(r => r.json()).then(d => { if (d.ok) refresh(); });
  });
  timeframeSelect.addEventListener('change', () => { fetchKlines(true); });

  window.addEventListener('resize', resizeCharts);
  refresh();
  fetchKlines();
  setInterval(refresh, INTERVAL_MS);
  setInterval(fetchOrders, INTERVAL_MS);
  setInterval(fetchKlines, INTERVAL_MS);
  setTimeout(() => { initCharts(); fetchKlines(true); resizeCharts(); }, 100);
})();
  </script>
</body>
</html>
