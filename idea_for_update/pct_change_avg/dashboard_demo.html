<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>% Change Avg Bands Demo</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body { margin: 0; background: #131722; color: #d1d4dc; font-family: Arial, sans-serif; }
    .bar { display: flex; gap: 8px; align-items: center; padding: 10px; background: #1e222d; border-bottom: 1px solid #2a2e39; }
    input, select, button {
      background: #2a2e39; border: 1px solid #363a45; color: #d1d4dc; border-radius: 4px; padding: 6px 8px;
    }
    #chartWrap { position: relative; width: 100%; height: calc(100vh - 56px); }
    #chart { position: relative; width: 100%; height: 100%; }
    #tradeVlines {
      position: absolute; left: 0; top: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 10; overflow: hidden;
    }
    .stat { margin-left: 8px; color: #9aa0ac; font-size: 12px; }
    .legend { margin-left: 12px; font-size: 11px; color: #787b86; }
    .legend .in { color: #26a69a; }
    .legend .out { color: #78909c; }
  </style>
</head>
<body>
  <div class="bar">
    <label>Symbol</label>
    <input id="symbol" value="BTCUSDT">
    <label>Khung</label>
    <select id="interval">
      <option>1m</option>
      <option selected>5m</option>
      <option>15m</option>
      <option>1h</option>
      <option>4h</option>
      <option>1d</option>
      <option>3d</option>
    </select>
    <label>Lookback trades</label>
    <input id="lookback" type="number" min="1" max="200" value="15">
    <button id="btnLoad">Load</button>
    <span class="stat" id="stat">trade_count=0 | avg_abs_pct=0%</span>
    <span class="legend"><span class="in">┃</span> Vào &nbsp; <span class="out">┃</span> Ra</span>
  </div>
  <div id="chartWrap">
    <div id="chart"></div>
  </div>

  <script src="./overlay_pct_change_avg_demo.js"></script>
</body>
</html>
